<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Storage Log — Geren Lockhart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --plum: #4a2040;
      --plum-light: #6b3560;
      --linen: #f8f4ef;
      --linen-dark: #ede7df;
      --steel: #4a7c9e;
      --steel-dark: #3a6580;
      --muted: #9c8a85;
      --text: #2d1f28;
      --card-bg: #ffffff;
      --border: #e0d5cc;
      --radius: 10px;
      --shadow: 0 2px 12px rgba(74,32,64,0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--linen);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    .site-header {
      background: var(--plum);
      color: white;
      padding: 16px 20px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .site-header img { height: 32px; opacity: 0.92; }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .header-subtitle {
      font-size: 0.72rem;
      opacity: 0.65;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-left: auto;
    }

    /* ── Toolbar ── */
    .toolbar {
      padding: 14px 16px 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 180px;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      padding: 9px 12px 9px 36px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
    }
    .search-wrap input:focus { outline: none; border-color: var(--steel); }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }
    .btn {
      padding: 9px 16px;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--plum); color: white; }
    .btn-steel   { background: var(--steel); color: white; }
    .btn-ghost   { background: transparent; color: var(--plum); border: 1px solid var(--border); }
    .btn-sm      { padding: 6px 12px; font-size: 0.8rem; }
    .btn-danger  { background: #8b2020; color: white; }

    .meta-bar {
      padding: 0 16px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #container-count {
      font-size: 0.78rem;
      color: var(--muted);
      flex: 1;
    }

    /* ── Grid ── */
    #container-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 0 16px 16px;
    }

    .container-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .container-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74,32,64,0.12); }

    .card-thumb {
      width: 100%;
      aspect-ratio: 4/3;
      background-size: cover;
      background-position: center;
      background-color: var(--linen-dark);
      position: relative;
    }
    .card-thumb-empty {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .thumb-icon { font-size: 1.6rem; color: var(--border); }
    .photo-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 20px;
    }

    .card-body { padding: 10px 10px 8px; }
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2px;
    }
    .container-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--plum);
      letter-spacing: 0.02em;
    }
    .container-type-label {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 4px;
      line-height: 1.2;
    }
    .card-desc {
      font-size: 0.8rem;
      color: var(--text);
      line-height: 1.3;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 4px;
    }
    .card-location {
      font-size: 0.72rem;
      color: var(--muted);
      background: var(--linen-dark);
      padding: 2px 6px;
      border-radius: 4px;
    }
    .card-value {
      font-size: 0.75rem;
      color: var(--steel);
      font-weight: 500;
    }
    .card-action-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.95rem;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .card-action-btn:hover { color: var(--plum); background: var(--linen-dark); }

    #empty-state {
      display: none;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    #empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    #empty-state p { font-size: 0.9rem; }

    /* ── Modals ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(45,31,40,0.45);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }

    .modal-sheet {
      background: white;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 600px;
      max-height: 92vh;
      overflow-y: auto;
      padding: 20px 20px 32px;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--plum);
    }
    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.3rem;
      color: var(--muted);
      padding: 4px 8px;
      border-radius: 6px;
    }
    .modal-close:hover { background: var(--linen-dark); color: var(--text); }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      background: white;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--steel);
    }
    .form-group textarea { resize: vertical; min-height: 70px; }

    .location-hints {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .hint-btn {
      padding: 4px 10px;
      background: var(--linen-dark);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      transition: background 0.15s;
    }
    .hint-btn:hover { background: var(--border); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── Photo upload zone ── */
    .photo-upload-zone {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      background: var(--linen);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .photo-upload-zone:hover { border-color: var(--steel); }
    .photo-upload-zone p { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
    .photo-upload-zone input[type="file"] { display: none; }

    .pending-photos-wrap { margin-top: 10px; }
    .pending-photo-row,
    .existing-photo-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--linen-dark);
    }
    .pending-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .pending-label-select {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      background: white;
    }
    .remove-pending-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 4px 6px;
      border-radius: 4px;
    }
    .remove-pending-btn:hover { color: #8b2020; background: #fdf0f0; }

    /* ── Modal actions ── */
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    #save-btn { flex: 1; }
    #delete-btn { display: none; }

    /* ── Detail Modal ── */
    .detail-code-hero {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--plum);
      margin-bottom: 2px;
    }
    .detail-type-sub {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 14px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--linen-dark);
      font-size: 0.88rem;
    }
    .detail-row span:first-child { color: var(--muted); font-size: 0.8rem; }
    .detail-row span:last-child { font-weight: 500; text-align: right; }
    .detail-link-row {
      padding: 10px 0;
    }
    .detail-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
      margin-top: 14px;
    }
    .gallery-item { position: relative; }
    .gallery-item img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .gallery-label {
      display: block;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .no-photos { color: var(--muted); font-size: 0.85rem; padding: 12px 0; }
    .detail-edit-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* ── Insurance Modal ── */
    .insurance-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .insurance-table th {
      text-align: left;
      padding: 6px 8px;
      border-bottom: 2px solid var(--plum);
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .insurance-table td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--linen-dark);
      vertical-align: top;
    }
    .insurance-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 2px solid var(--plum);
    }
    .insurance-total-row span:first-child { font-weight: 500; font-size: 0.85rem; }
    .insurance-total-row span:last-child {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--plum);
    }

    /* ── Bin Types Modal ── */
    .bin-type-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--linen-dark);
      font-size: 0.88rem;
    }
    .new-bin-type-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .new-bin-type-row input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
    }
    .new-bin-type-row input:focus { outline: none; border-color: var(--steel); }

    /* ── Bottom Nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 150;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 8px;
      text-decoration: none;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .nav-item.active { color: var(--plum); }
    .nav-item:hover { color: var(--plum); }
    .nav-icon { font-size: 1.15rem; margin-bottom: 2px; }

    /* ── Desktop ── */
    @media (min-width: 700px) {
      body { display: flex; flex-direction: column; }
      .bottom-nav { display: none; }
      .site-header { padding: 18px 32px; }
      .toolbar { padding: 16px 32px 10px; }
      .meta-bar { padding: 0 32px 12px; }
      #container-grid { padding: 0 32px 32px; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
      .modal-backdrop { align-items: center; }
      .modal-sheet { border-radius: 14px; max-height: 88vh; }
    }

    /* ── Print ── */
    @media print {
      .site-header, .toolbar, .meta-bar, #container-grid, .bottom-nav,
      .modal-header .modal-close, .modal-actions { display: none !important; }
      .modal-backdrop { position: static; background: none; display: block; }
      .modal-sheet { box-shadow: none; max-height: none; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <img src="assets/gl-logo.png" alt="GL" />
    <span class="header-title">Storage Log</span>
    <span class="header-subtitle">Geren Lockhart</span>
  </header>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input id="search-input" type="search" placeholder="Search containers…" autocomplete="off" />
    </div>
    <button class="btn btn-primary" id="add-btn">+ Add</button>
    <button class="btn btn-ghost btn-sm" id="insurance-btn">Report</button>
    <button class="btn btn-ghost btn-sm" id="bin-types-btn">Types</button>
  </div>

  <div class="meta-bar">
    <span id="container-count">Loading…</span>
  </div>

  <!-- Grid -->
  <div id="container-grid"></div>

  <div id="empty-state">
    <div class="empty-icon">&#9633;</div>
    <p>No containers yet.<br />Tap + Add to get started.</p>
  </div>

  <!-- ── Add / Edit Modal ── -->
  <div class="modal-backdrop" id="add-modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Container</span>
        <button class="modal-close" id="close-add-modal">&times;</button>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Code *</label>
          <input id="f-code" type="text" placeholder="e.g. A1, B3" autocomplete="off" />
        </div>
        <div class="form-group">
          <label>Est. Value ($)</label>
          <input id="f-value" type="number" placeholder="0" min="0" />
        </div>
      </div>

      <div class="form-group">
        <label>Bin Type</label>
        <select id="f-bin-type">
          <option value="">— select type —</option>
        </select>
      </div>

      <div class="form-group">
        <label>Description</label>
        <textarea id="f-description" placeholder="What's inside…"></textarea>
      </div>

      <div class="form-group">
        <label>Location</label>
        <input id="f-location" type="text" placeholder="e.g. BW · Col 3 · Shelf 2" autocomplete="off" />
        <div class="location-hints">
          <button type="button" class="hint-btn" onclick="setLocation('BW · Col 1')">BW · Col 1</button>
          <button type="button" class="hint-btn" onclick="setLocation('BW · Col 2')">BW · Col 2</button>
          <button type="button" class="hint-btn" onclick="setLocation('BW · Col 3')">BW · Col 3</button>
          <button type="button" class="hint-btn" onclick="setLocation('HDX · Shelf 1')">HDX · Shelf 1</button>
          <button type="button" class="hint-btn" onclick="setLocation('HDX · Shelf 2')">HDX · Shelf 2</button>
          <button type="button" class="hint-btn" onclick="setLocation('Floor')">Floor</button>
        </div>
      </div>

      <div class="form-group">
        <label>Product Link</label>
        <input id="f-product-link" type="url" placeholder="https://…" autocomplete="off" />
      </div>

      <div class="form-group">
        <label>Photos</label>
        <!-- Existing photos (shown in edit mode) -->
        <div id="existing-photos-list"></div>
        <!-- Upload zone -->
        <label class="photo-upload-zone" for="photo-input">
          <div>&#128247; Tap to add photos</div>
          <p>Supports multiple · exterior / interior / detail</p>
          <input id="photo-input" type="file" accept="image/*" multiple />
        </label>
        <div class="pending-photos-wrap" id="pending-photos"></div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary" id="save-btn">Save</button>
        <button class="btn btn-danger btn-sm" id="delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <!-- ── Detail Modal ── -->
  <div class="modal-backdrop" id="detail-modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <div>
          <div class="detail-code-hero" id="detail-code">—</div>
          <div class="detail-type-sub" id="detail-type"></div>
        </div>
        <button class="modal-close" id="close-detail-modal">&times;</button>
      </div>

      <div class="detail-row">
        <span>Location</span>
        <span id="detail-location">—</span>
      </div>
      <div class="detail-row">
        <span>Est. Value</span>
        <span id="detail-value">—</span>
      </div>
      <div class="detail-row" style="border-bottom:none; padding-bottom:0;">
        <span>Notes</span>
        <span id="detail-desc" style="max-width:60%; color:var(--text);"></span>
      </div>

      <div class="detail-link-row">
        <a id="detail-link" href="#" target="_blank" rel="noopener" style="color:var(--steel); font-size:0.85rem; display:none;"></a>
      </div>

      <div class="detail-gallery" id="detail-gallery"></div>

      <div class="detail-edit-row">
        <button class="btn btn-ghost btn-sm" id="detail-edit-btn">Edit</button>
      </div>
    </div>
  </div>

  <!-- ── Insurance Modal ── -->
  <div class="modal-backdrop" id="insurance-modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">Insurance Report</span>
        <button class="modal-close" id="close-insurance-modal">&times;</button>
      </div>
      <table class="insurance-table">
        <thead>
          <tr>
            <th>Code</th>
            <th>Type</th>
            <th>Contents</th>
            <th>Location</th>
            <th style="text-align:right">Value</th>
          </tr>
        </thead>
        <tbody id="insurance-table-body"></tbody>
      </table>
      <div class="insurance-total-row">
        <span>Total Estimated Value</span>
        <span id="insurance-total">$0</span>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost btn-sm" id="print-insurance-btn">&#128424; Print</button>
        <button class="btn btn-ghost btn-sm" id="close-insurance-modal-2" onclick="closeInsurance()">Close</button>
      </div>
    </div>
  </div>

  <!-- ── Bin Types Modal ── -->
  <div class="modal-backdrop" id="bin-types-modal">
    <div class="modal-sheet">
      <div class="modal-header">
        <span class="modal-title">Container Types</span>
        <button class="modal-close" id="close-bin-types-modal">&times;</button>
      </div>
      <div id="bin-types-list"></div>
      <div class="new-bin-type-row">
        <input id="new-bin-type-input" type="text" placeholder="Add new type…" />
        <button class="btn btn-steel btn-sm" id="add-bin-type-btn">Add</button>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="planner.html" class="nav-item">
      <span class="nav-icon">&#9744;</span>
      Planner
    </a>
    <a href="storage.html" class="nav-item active">
      <span class="nav-icon">&#9632;</span>
